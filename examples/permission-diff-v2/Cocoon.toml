[capsule]
name = "permission-diff-demo"
version = "0.2.0"
description = "Permission diff demo v2"
authors = ["Arthur Tsang"]
license = "MIT"

[entry]
cmd = "/app/bin/demo-service"
args = []
cwd = "/app"

[filesystem]
root = "/app"
readonly = ["/app/assets"]
writable = ["/app/data", "/app/cache"]

[[permission]]
scheme = "file"
action = "readwrite"
target = "/app/cache/**"

[[permission]]
scheme = "tcp"
action = "connect"
target = "api.example.com:443"

[[permission]]
scheme = "log"
action = "write"
target = "service-log"

[[preopen]]
scheme = "file"
host_path = "/pkg/cocoon/capsules/permission-diff-demo/current"
guest_path = "/app"
rights = ["read", "execute"]

[[scheme]]
name = "log"
visibility = "readwrite"
target = "service-log"

[network]
default = "deny"

[audit]
events = true
stdout = true
stderr = true
