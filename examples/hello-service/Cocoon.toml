[capsule]
name = "hello-service"
version = "0.1.0"
description = "Minimal Cocoon demo service"
authors = ["Arthur Tsang"]
license = "MIT"

[entry]
cmd = "/app/bin/hello-service"
args = []
cwd = "/app"

[filesystem]
root = "/app"
writable = [
  "/app/data",
  "/app/tmp"
]
readonly = [
  "/app/etc",
  "/app/assets"
]

[[permission]]
scheme = "file"
action = "readwrite"
target = "/app/**"

[[permission]]
scheme = "log"
action = "write"
target = "hello-service"

[[permission]]
scheme = "time"
action = "read"
target = "readonly"

[[permission]]
scheme = "rand"
action = "read"
target = "readonly"

[[permission]]
effect = "deny"
scheme = "file"
action = "readwrite"
target = "/home/**"

[[permission]]
effect = "deny"
scheme = "file"
action = "readwrite"
target = "/etc/secrets/**"

[[permission]]
effect = "deny"
scheme = "tcp"
action = "connect"
target = "*"

[[permission]]
effect = "deny"
scheme = "device"
action = "manage"
target = "/**"

[[preopen]]
scheme = "file"
host_path = "/pkg/cocoon/capsules/hello-service/current"
guest_path = "/app"
rights = ["read", "execute"]

[[scheme]]
name = "log"
visibility = "readwrite"
target = "service-log"

[network]
default = "deny"

[resources]
memory_mb = 64
max_processes = 4
max_open_fds = 64

[update]
signed = true
rollback = true
permission_expansion_requires_confirmation = true

[audit]
events = true
stdout = true
stderr = true
